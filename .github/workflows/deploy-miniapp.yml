name: Deploy Mini App to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare static site from nimarita/web/static
        run: |
          rm -rf _site
          mkdir -p _site
          cp -R nimarita/web/static/* _site/
          touch _site/.nojekyll

      - name: Inject API_BASE into index.html
        run: |
          API_BASE="${{ secrets.MINIAPP_API_BASE }}"
          if [ -z "$API_BASE" ]; then
            API_BASE="https://nimaritalove-production.up.railway.app"
          fi
          sed -i "s|PLACEHOLDER_API_BASE|${API_BASE}|g" _site/index.html

      - name: Verify API_BASE injection
        run: |
          if grep -q 'PLACEHOLDER_API_BASE' _site/index.html; then
            echo "ERROR: PLACEHOLDER_API_BASE was not replaced in _site/index.html"
            exit 1
          fi
          if ! grep -Eq 'https://[^"[:space:]]+' _site/index.html; then
            echo "ERROR: injected index.html does not contain any HTTPS backend URL"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
