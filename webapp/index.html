<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Напоминалки</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;700;800&display=swap");

      :root {
        --bg: #f4ecdf;
        --paper: rgba(255, 250, 242, 0.92);
        --paper-strong: #fffaf3;
        --ink: #24170f;
        --muted: #6d584a;
        --line: rgba(36, 23, 15, 0.12);
        --accent: #cb5a31;
        --accent-strong: #9f3d1a;
        --accent-soft: rgba(203, 90, 49, 0.1);
        --ok: #2e6e50;
        --bad: #a33232;
        --shadow: 0 24px 70px rgba(77, 45, 17, 0.14);
        --radius-xl: 28px;
        --radius-lg: 20px;
        --radius-md: 16px;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(255, 198, 138, 0.48), transparent 28%),
          radial-gradient(circle at bottom right, rgba(203, 90, 49, 0.18), transparent 24%),
          linear-gradient(180deg, #f8f1e8 0%, var(--bg) 100%);
        font-family: "Manrope", "Segoe UI", sans-serif;
      }

      .shell {
        width: min(1040px, calc(100vw - 24px));
        margin: 0 auto;
        padding: 18px 0 36px;
      }

      .panel {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
      }

      .hero {
        padding: 24px;
        margin-bottom: 16px;
        overflow: hidden;
        position: relative;
      }

      .hero::after {
        content: "";
        position: absolute;
        width: 180px;
        height: 180px;
        right: -40px;
        top: -40px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(203, 90, 49, 0.18), transparent 70%);
      }

      .eyebrow {
        margin: 0 0 8px;
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent-strong);
        font-weight: 800;
      }

      h1, h2, h3 { margin: 0; }

      h1 {
        font-family: "Fraunces", serif;
        font-size: clamp(34px, 7vw, 52px);
        line-height: 0.96;
        max-width: 8ch;
      }

      h2 {
        font-family: "Fraunces", serif;
        font-size: 26px;
        margin-bottom: 14px;
      }

      .subtitle {
        margin: 12px 0 0;
        max-width: 60ch;
        color: var(--muted);
      }

      .hero-grid {
        display: grid;
        grid-template-columns: 1.3fr 0.7fr;
        gap: 18px;
        align-items: end;
      }

      .hero-side {
        display: grid;
        gap: 10px;
      }

      .identity,
      .stats,
      .filters,
      .item-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .pill,
      .badge,
      .chip {
        border-radius: 999px;
        padding: 8px 11px;
        border: 1px solid rgba(203, 90, 49, 0.16);
        background: var(--accent-soft);
        font-size: 12px;
      }

      .chip {
        cursor: pointer;
        background: rgba(36, 23, 15, 0.04);
        border-color: var(--line);
        color: var(--ink);
        transition: 160ms ease;
      }

      .chip.active {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff7f3;
      }

      .layout {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 16px;
      }

      .column {
        display: grid;
        gap: 16px;
      }

      .section {
        padding: 20px;
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      .two-col {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        font-weight: 800;
      }

      input, select, textarea, button {
        font: inherit;
      }

      input, select, textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        padding: 13px 14px;
        background: var(--paper-strong);
        color: var(--ink);
        outline: none;
        transition: 160ms ease;
      }

      input:focus, select:focus, textarea:focus {
        border-color: rgba(203, 90, 49, 0.45);
        box-shadow: 0 0 0 4px rgba(203, 90, 49, 0.08);
      }

      textarea {
        min-height: 116px;
        resize: vertical;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        background: var(--accent);
        color: #fff8f4;
        cursor: pointer;
        font-weight: 800;
        transition: transform 140ms ease, opacity 140ms ease;
      }

      button.secondary {
        background: rgba(36, 23, 15, 0.08);
        color: var(--ink);
      }

      button.ghost {
        background: transparent;
        color: var(--accent-strong);
        border: 1px solid rgba(203, 90, 49, 0.16);
      }

      button:hover { transform: translateY(-1px); }
      button:disabled { opacity: 0.55; cursor: default; transform: none; }

      .preview {
        padding: 14px;
        border: 1px dashed rgba(203, 90, 49, 0.24);
        border-radius: var(--radius-lg);
        background: rgba(203, 90, 49, 0.05);
      }

      .preview small, .muted { color: var(--muted); }

      .status {
        min-height: 22px;
        color: var(--muted);
        font-size: 14px;
      }

      .status.ok { color: var(--ok); }
      .status.bad { color: var(--bad); }

      .list {
        display: grid;
        gap: 12px;
      }

      .item {
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        padding: 14px;
        background: var(--paper-strong);
        transition: 180ms ease;
      }

      .item.done {
        opacity: 0.55;
        transform: scale(0.98);
      }

      .item-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin-bottom: 8px;
      }

      .item-text {
        line-height: 1.45;
      }

      .empty {
        padding: 18px;
        border-radius: var(--radius-lg);
        background: rgba(36, 23, 15, 0.04);
        color: var(--muted);
      }

      @media (max-width: 860px) {
        .hero-grid,
        .layout,
        .two-col {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="panel hero">
        <div class="hero-grid">
          <div>
            <p class="eyebrow">Telegram Mini App</p>
            <h1>Напоминания, которые не теряются</h1>
            <p class="subtitle">
              Production Mini App для быстрого создания, просмотра и закрытия
              напоминаний прямо внутри Telegram.
            </p>
          </div>
          <div class="hero-side">
            <div id="identity" class="identity"></div>
            <div id="stats" class="stats"></div>
          </div>
        </div>
      </section>

      <section class="layout">
        <div class="column">
          <section class="panel section">
            <h2>Новое напоминание</h2>
            <form id="form" class="stack">
              <label>
                Текст
                <textarea id="text" placeholder="Например: написать врачу после обеда"></textarea>
              </label>

              <div class="two-col">
                <label>
                  Тип
                  <select id="kind">
                    <option value="once">Разовое</option>
                    <option value="daily">Ежедневное</option>
                  </select>
                </label>
                <label>
                  Получатель
                  <select id="recipient">
                    <option value="">Себе</option>
                  </select>
                </label>
              </div>

              <div id="once-fields" class="two-col">
                <label>Дата<input id="date" type="date" /></label>
                <label>Время<input id="time" type="time" /></label>
              </div>

              <div id="daily-fields" class="two-col" hidden>
                <label>Время<input id="daily-time" type="time" value="09:00" /></label>
                <label>Таймзона<input id="timezone" value="Europe/Moscow" /></label>
              </div>

              <div class="actions">
                <button id="submit" type="submit">Создать</button>
                <button id="refresh" class="secondary" type="button">Обновить</button>
              </div>
              <div id="status" class="status"></div>
            </form>
          </section>

          <section class="panel section">
            <h3>Превью</h3>
            <div id="preview" class="preview">
              <strong>Напоминание пока не заполнено.</strong><br />
              <small>Выбери тип, дату и получателя.</small>
            </div>
          </section>
        </div>

        <div class="column">
          <section class="panel section">
            <h2>Активные</h2>
            <div id="filters" class="filters">
              <button class="chip active" type="button" data-filter="all">Все</button>
              <button class="chip" type="button" data-filter="once">Разовые</button>
              <button class="chip" type="button" data-filter="daily">Ежедневные</button>
            </div>
            <div id="list" class="list" style="margin-top: 14px;">
              <div class="empty">Загрузка…</div>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script>
      const tg = window.Telegram?.WebApp;
      tg?.ready();
      tg?.expand();

      const state = {
        initData: tg?.initData || "",
        reminders: [],
        filter: "all",
      };

      const $ = (id) => document.getElementById(id);

      function pulse(type = "selection") {
        if (!tg?.HapticFeedback) return;
        if (type === "success") tg.HapticFeedback.notificationOccurred("success");
        else if (type === "error") tg.HapticFeedback.notificationOccurred("error");
        else tg.HapticFeedback.selectionChanged();
      }

      function setStatus(message, tone = "") {
        $("status").textContent = message;
        $("status").className = `status ${tone}`.trim();
      }

      async function api(url, options = {}) {
        const response = await fetch(url, {
          ...options,
          headers: {
            "Content-Type": "application/json",
            "X-Telegram-Init-Data": state.initData,
            ...(options.headers || {}),
          },
        });
        const data = await response.json();
        if (!response.ok || data.ok === false) {
          throw new Error(data.error || "Ошибка запроса");
        }
        return data;
      }

      function applyTelegramTheme() {
        if (!tg?.themeParams) return;
        const root = document.documentElement.style;
        if (tg.themeParams.bg_color) root.setProperty("--bg", tg.themeParams.bg_color);
        if (tg.themeParams.text_color) root.setProperty("--ink", tg.themeParams.text_color);
        if (tg.themeParams.hint_color) root.setProperty("--muted", tg.themeParams.hint_color);
        if (tg.themeParams.button_color) root.setProperty("--accent", tg.themeParams.button_color);
      }

      function syncKind() {
        const daily = $("kind").value === "daily";
        $("once-fields").hidden = daily;
        $("daily-fields").hidden = !daily;
        updatePreview();
      }

      function getRecipientLabel() {
        const option = $("recipient").selectedOptions[0];
        return option ? option.textContent : "Себе";
      }

      function updatePreview() {
        const text = $("text").value.trim();
        const kind = $("kind").value;
        const recipient = getRecipientLabel();
        if (!text) {
          $("preview").innerHTML =
            "<strong>Напоминание пока не заполнено.</strong><br /><small>Выбери тип, дату и получателя.</small>";
          if (tg?.MainButton) tg.MainButton.hide();
          return;
        }

        let when = "без времени";
        if (kind === "daily") {
          when = `каждый день в ${$("daily-time").value || "09:00"}`;
        } else if ($("date").value && $("time").value) {
          when = `${$("date").value} ${$("time").value}`;
        }

        $("preview").innerHTML = `
          <strong>${text}</strong><br />
          <small>${kind === "daily" ? "Ежедневное" : "Разовое"} · ${when} · ${recipient}</small>
        `;

        if (tg?.MainButton) {
          tg.MainButton.setText("Создать напоминание");
          tg.MainButton.show();
        }
      }

      function renderIdentity(payload) {
        const identity = [];
        if (payload.profile) {
          identity.push(`${payload.profile.label} · ${payload.profile.role} · ${payload.profile.gender}`);
        } else if (payload.user?.first_name) {
          identity.push(payload.user.first_name);
        } else {
          identity.push("Локальный режим");
        }
        identity.push(`chat ${payload.chat?.id ?? "?"}`);
        $("identity").innerHTML = identity.map((x) => `<span class="pill">${x}</span>`).join("");

        const reminders = payload.reminder_count || 0;
        $("stats").innerHTML = [
          `<span class="pill">активных: ${reminders}</span>`,
          `<span class="pill">web ${state.initData ? "secured" : "demo"}</span>`
        ].join("");

        $("recipient").innerHTML = '<option value="">Себе</option>';
        for (const recipient of payload.available_recipients || []) {
          const option = document.createElement("option");
          option.value = String(recipient.id);
          option.textContent = `${recipient.label} · ${recipient.role}`;
          $("recipient").append(option);
        }
      }

      function filteredReminders() {
        if (state.filter === "all") return state.reminders;
        return state.reminders.filter((item) => item.kind === state.filter);
      }

      function renderList() {
        const reminders = filteredReminders();
        if (!reminders.length) {
          $("list").innerHTML = '<div class="empty">Под выбранный фильтр пока ничего нет.</div>';
          return;
        }

        $("list").innerHTML = reminders.map((item) => {
          const when = item.kind === "daily"
            ? `${item.daily_time || "ежедневно"} · ${item.timezone}`
            : (item.run_at ? new Date(item.run_at).toLocaleString("ru-RU") : "без даты");
          return `
            <article class="item" id="reminder-${item.id}">
              <div class="item-head">
                <strong>#${item.id}</strong>
                <button class="ghost" type="button" data-complete="${item.id}">Отметить</button>
              </div>
              <div class="item-text">${escapeHtml(item.text)}</div>
              <div class="item-meta">
                <span class="badge">${item.kind}</span>
                <span class="badge">${when}</span>
                <span class="badge">получатель ${item.recipient_chat_id}</span>
              </div>
            </article>
          `;
        }).join("");
      }

      function escapeHtml(text) {
        return text
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      async function loadAuth() {
        if (!state.initData) {
          renderIdentity({
            user: { first_name: "Локальный режим" },
            chat: { id: "?" },
            reminder_count: 0,
            available_recipients: [],
          });
          state.reminders = [];
          renderList();
          setStatus("Mini App нужно открывать из Telegram.", "bad");
          return;
        }

        const payload = await api("/auth", {
          method: "POST",
          body: JSON.stringify({ initData: state.initData }),
        });
        renderIdentity(payload);
      }

      async function loadReminders() {
        if (!state.initData) {
          state.reminders = [];
          renderList();
          return;
        }
        const payload = await api("/reminders");
        state.reminders = payload.reminders || [];
        renderList();
      }

      function buildPayload() {
        const kind = $("kind").value;
        if (kind === "daily") {
          return {
            kind,
            text: $("text").value.trim(),
            daily_time: $("daily-time").value || "09:00",
            timezone: $("timezone").value.trim() || "Europe/Moscow",
            recipient_chat_id: $("recipient").value || null,
          };
        }
        return {
          kind,
          text: $("text").value.trim(),
          date: $("date").value,
          time: $("time").value,
          timezone: "Europe/Moscow",
          recipient_chat_id: $("recipient").value || null,
        };
      }

      async function submitReminder(event) {
        if (event) event.preventDefault();
        const payload = buildPayload();
        if (!payload.text) {
          pulse("error");
          setStatus("Текст напоминания обязателен.", "bad");
          return;
        }
        if (payload.kind === "once" && (!payload.date || !payload.time)) {
          pulse("error");
          setStatus("Для разового напоминания нужны дата и время.", "bad");
          return;
        }

        $("submit").disabled = true;
        tg?.MainButton?.showProgress();
        setStatus("Сохраняю…");

        try {
          await api("/reminder", { method: "POST", body: JSON.stringify(payload) });
          pulse("success");
          $("form").reset();
          $("daily-time").value = "09:00";
          $("timezone").value = "Europe/Moscow";
          syncKind();
          await loadAuth();
          await loadReminders();
          setStatus("Напоминание создано.", "ok");
        } catch (error) {
          pulse("error");
          setStatus(error.message, "bad");
        } finally {
          $("submit").disabled = false;
          tg?.MainButton?.hideProgress();
          updatePreview();
        }
      }

      async function completeReminder(id) {
        const node = document.getElementById(`reminder-${id}`);
        if (node) node.classList.add("done");
        try {
          await api(`/reminder/${id}/complete`, { method: "POST", body: "{}" });
          pulse("success");
          await loadAuth();
          await loadReminders();
          setStatus(`Напоминание #${id} отмечено.`, "ok");
        } catch (error) {
          if (node) node.classList.remove("done");
          pulse("error");
          setStatus(error.message, "bad");
        }
      }

      function bindEvents() {
        $("kind").addEventListener("change", syncKind);
        $("text").addEventListener("input", updatePreview);
        $("date").addEventListener("input", updatePreview);
        $("time").addEventListener("input", updatePreview);
        $("daily-time").addEventListener("input", updatePreview);
        $("recipient").addEventListener("change", updatePreview);
        $("form").addEventListener("submit", submitReminder);
        $("refresh").addEventListener("click", async () => {
          try {
            await loadAuth();
            await loadReminders();
            pulse();
            setStatus("Список обновлён.", "ok");
          } catch (error) {
            pulse("error");
            setStatus(error.message, "bad");
          }
        });
        $("filters").addEventListener("click", (event) => {
          const button = event.target.closest("[data-filter]");
          if (!button) return;
          state.filter = button.dataset.filter;
          for (const chip of $("filters").querySelectorAll(".chip")) {
            chip.classList.toggle("active", chip.dataset.filter === state.filter);
          }
          pulse();
          renderList();
        });
        $("list").addEventListener("click", async (event) => {
          const button = event.target.closest("[data-complete]");
          if (!button) return;
          await completeReminder(button.dataset.complete);
        });
        tg?.MainButton?.onClick(() => submitReminder());
      }

      applyTelegramTheme();
      bindEvents();
      syncKind();
      updatePreview();
      loadAuth().then(loadReminders).catch((error) => setStatus(error.message, "bad"));
    </script>
  </body>
</html>
